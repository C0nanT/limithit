name: Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-vet:
    name: Build & Vet (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Fmt check
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "gofmt violations:"
            echo "$files"
            exit 1
          fi

  build-and-vet-testserver:
    name: Build & Vet (testserver)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testserver
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Fmt check
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "gofmt violations:"
            echo "$files"
            exit 1
          fi
